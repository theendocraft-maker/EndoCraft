<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EndoCraft — Session</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --border: rgba(255,255,255,0.06);
  --accent: #7B6CF6;
  --accent-dim: rgba(123,108,246,0.12);
  --accent-border: rgba(123,108,246,0.25);
  --gold: #E8B86D;
  --text: #e8e8f0;
  --text-muted: #6b6b88;
  --text-dim: #3a3a55;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 20px 80px;
}

.topbar {
  width: 100%; max-width: 480px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 40px;
}
.brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
.brand-mark {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; color: white;
}
.brand-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); }
.brand-name span { color: var(--accent); }
.try-btn {
  font-size: 12px; font-weight: 600; color: white;
  background: var(--accent); border-radius: 8px;
  padding: 7px 16px; text-decoration: none;
}

/* Loading */
.loading {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  padding: 60px 20px; color: var(--text-muted); font-style: italic;
}
.loading-ring {
  width: 36px; height: 36px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Card */
.card-wrap { width: 100%; max-width: 480px; }
.card {
  background: #ffffff; border-radius: 20px;
  overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}
.card-accent { height: 5px; background: linear-gradient(to right, #7B6CF6, #E8B86D); }
.card-body { padding: 22px; }
.card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-campaign { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; color: #7B6CF6; letter-spacing: 1px; }
.card-date { font-size: 11px; color: #aaaaaa; }
.card-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: #111; margin-bottom: 8px; line-height: 1.2; }
.card-mvp { font-size: 12px; color: #7B6CF6; font-weight: 500; margin-bottom: 14px; }
.card-moments { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.card-moment {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 10px 12px; background: #f5f5f8; border-radius: 10px;
  font-size: 13px; color: #555; line-height: 1.4;
}
.card-num { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; color: #7B6CF6; flex-shrink: 0; margin-top: 1px; }
.card-cliffhanger {
  font-size: 12px; color: #888; font-style: italic;
  padding: 10px 12px; background: #fff8ee; border-radius: 8px;
  border-left: 3px solid #E8B86D; margin-bottom: 14px;
}
.card-npc { margin-bottom: 14px; }
.card-npc-label { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #aaa; margin-bottom: 8px; }
.card-npc-text { font-size: 13px; color: #666; line-height: 1.6; }
.card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 1px solid #eeeeee; }
.card-players { font-size: 11px; color: #aaaaaa; }
.card-logo { font-family: 'Syne', sans-serif; font-size: 10px; color: #aaaaaa; font-weight: 700; letter-spacing: 1px; }

/* CTA */
.cta-box {
  margin-top: 24px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px; text-align: center;
}
.cta-text { font-size: 14px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.6; }
.cta-text strong { color: var(--text); }
.cta-btn {
  display: block; width: 100%; padding: 13px;
  background: var(--accent); color: white;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 1px; border-radius: 10px; text-decoration: none;
  transition: opacity 0.2s;
}
.cta-btn:hover { opacity: 0.85; }

.error-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.error-state h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="https://endocraft.app">
    <div class="brand-mark">E</div>
    <span class="brand-name">EndoCraft<span>.</span></span>
  </a>
  <a class="try-btn" href="https://endocraft.app/scroll">Try for free →</a>
</div>

<div id="loadingState" class="loading">
  <div class="loading-ring"></div>
  <span>Loading session…</span>
</div>

<div id="errorState" class="error-state" style="display:none;">
  <h2>Session not found</h2>
  <p>This link may have expired or doesn't exist.</p>
</div>

<div id="cardWrap" class="card-wrap" style="display:none;">
  <div class="card">
    <div class="card-accent"></div>
    <div class="card-body">
      <div class="card-top">
        <span class="card-campaign" id="cardCampaign">EndoCraft</span>
        <span class="card-date" id="cardDate"></span>
      </div>
      <div class="card-title" id="cardTitle"></div>
      <div class="card-mvp" id="cardMvp" style="display:none;"></div>
      <div class="card-moments" id="cardMoments"></div>
      <div class="card-cliffhanger" id="cardCliffhanger" style="display:none;"></div>
      <div class="card-npc" id="cardNpcWrap" style="display:none;">
        <div class="card-npc-label">NPC Log</div>
        <div class="card-npc-text" id="cardNpc"></div>
      </div>
      <div class="card-footer">
        <span class="card-players" id="cardPlayers">Your party</span>
        <span class="card-logo">endocraft.app</span>
      </div>
    </div>
  </div>

  <div class="cta-box">
    <div class="cta-text"><strong>Want this for your sessions?</strong><br>Tell EndoCraft what happened — get summaries, NPC logs and image prompts in seconds.</div>
    <a class="cta-btn" href="https://endocraft.app/scroll">✦ Try for free</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dtlzsbhyngafhxkjjlst.supabase.co';
const SUPABASE_KEY = 'sb_publishable_J3aiHIpBxzWY8-Ag24lo-Q_GdpRC263';

async function loadSession() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  
  if (!id) { showError(); return; }
  
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/sessions?id=eq.' + id + '&select=*', {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    const data = await res.json();
    if (!data || data.length === 0) { showError(); return; }
    renderCard(data[0]);
  } catch(e) {
    showError();
  }
}

function renderCard(s) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('cardWrap').style.display = 'block';
  
  document.getElementById('cardTitle').textContent = s.session_title || 'D&D Session';
  
  const date = new Date(s.created_at);
  document.getElementById('cardDate').textContent = date.toLocaleDateString('en-GB');
  
  if (s.moments && s.moments.length > 0) {
    const momentsEl = document.getElementById('cardMoments');
    s.moments.forEach((m, i) => {
      const div = document.createElement('div');
      div.className = 'card-moment';
      div.innerHTML = '<span class="card-num">0' + (i+1) + '</span>' + (typeof m === 'string' ? m : JSON.stringify(m));
      momentsEl.appendChild(div);
    });
  }
  
  if (s.cliffhanger) {
    document.getElementById('cardCliffhanger').textContent = '⚡ ' + s.cliffhanger;
    document.getElementById('cardCliffhanger').style.display = 'block';
  }
  
  if (s.npc_log && s.npc_log.length > 10) {
    document.getElementById('cardNpc').textContent = s.npc_log;
    document.getElementById('cardNpcWrap').style.display = 'block';
  }
}

function showError() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
}

loadSession();
</script>
</body>
</html>
