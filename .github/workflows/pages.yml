name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manueller Trigger via GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Cancelt automatisch vorherigen Run wenn neuer startet — verhindert hängende Locks
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble site (Werkstatt-Assets ausschliessen)
        run: |
          mkdir -p /tmp/_site
          rsync -a \
            --include='free/endocraft-free-pack.zip' \
            --exclude='.git' --exclude='.github' \
            --exclude='social/' \
            --exclude='*.zip' \
            --exclude='*.md' \
            --exclude='MOTION-*.mp4' --exclude='EPIC-*.mp4' \
            --exclude='_bro_*.jpg' --exclude='_cel_*.jpg' \
            --exclude='IMG_*.PNG' \
            ./ /tmp/_site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '/tmp/_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000  # 30 Minuten statt default 10
          error_count: 20
