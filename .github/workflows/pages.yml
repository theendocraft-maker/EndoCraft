name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manueller Trigger via GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Cancelt automatisch vorherigen Run wenn neuer startet — verhindert hängende Locks
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000  # 30 Minuten statt default 10
          error_count: 20
