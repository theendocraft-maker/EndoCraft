name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manueller Trigger via GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Cancelt automatisch vorherigen Run wenn neuer startet — verhindert hängende Locks
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble site (Werkstatt-Assets ausschliessen)
        run: |
          mkdir -p /tmp/_site
          rsync -a \
            --include='free/endocraft-free-pack.zip' \
            --exclude='.git' --exclude='.github' \
            --exclude='social/' \
            --exclude='*.zip' \
            --exclude='*.md' \
            --exclude='MOTION-*.mp4' --exclude='EPIC-*.mp4' \
            --exclude='_bro_*.jpg' --exclude='_cel_*.jpg' \
            --exclude='IMG_*.PNG' \
            ./ /tmp/_site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '/tmp/_site'

      # Pages-Backend ist flaky ("Deployment failed, try again later") — bis zu 3 Versuche
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          error_count: 20

      - name: Warten vor Retry 1
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - name: Deploy (Retry 1)
        id: deploy2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          error_count: 20

      - name: Warten vor Retry 2
        if: steps.deployment.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 120

      - name: Deploy (Retry 2)
        id: deploy3
        if: steps.deployment.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          error_count: 20

      - name: Deploy-Ergebnis prüfen
        if: always()
        run: |
          if [ "${{ steps.deployment.outcome }}" = "success" ] || [ "${{ steps.deploy2.outcome }}" = "success" ] || [ "${{ steps.deploy3.outcome }}" = "success" ]; then
            echo "Deploy erfolgreich."
          else
            echo "Alle 3 Deploy-Versuche fehlgeschlagen."; exit 1
          fi
