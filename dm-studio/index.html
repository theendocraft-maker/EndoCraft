<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --surface:#1a1a24;
  --surface-2:#22222e;
  --text:#f0eff4;
  --text-dim:rgba(255,255,255,0.5);
  --text-dimmer:rgba(255,255,255,0.25);
  --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.14);
  --accent:#7B6CF6;
  --accent-dim:rgba(123,108,246,0.15);
  --gold:#E8B86D;
  --gold-dim:rgba(232,184,109,0.15);
  --crimson:#E04A3A;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.55;display:flex;flex-direction:column;}

/* ═══════ TOP BAR ═══════ */
.topbar{
  height:56px;flex-shrink:0;
  display:flex;align-items:center;padding:0 22px;gap:18px;
  background:rgba(10,10,15,0.75);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);z-index:10;
}
.logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--text);text-decoration:none;}
.logo img{width:26px;height:26px;object-fit:contain;}
.logo .sub{color:var(--text-dim);font-weight:400;font-size:13px;margin-left:6px;}
.topbar-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}

.campaign-pill{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--border-strong);border-radius:10px;
  padding:6px 12px 6px 14px;cursor:pointer;transition:border-color .2s;
}
.campaign-pill:hover{border-color:rgba(232,184,109,.35);}
.campaign-pill .dot{width:8px;height:8px;border-radius:50%;background:#4A8A4A;flex-shrink:0;box-shadow:0 0 8px rgba(74,138,74,.6);}
.campaign-pill-name{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:1.8px;color:var(--gold);text-transform:uppercase;}
.campaign-pill-meta{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text-dim);font-style:italic;}

.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn-top{
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  padding:7px 14px;border-radius:8px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border-strong);color:var(--text-dim);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-top:hover{background:rgba(255,255,255,0.08);color:var(--text);}
.btn-top.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-top.primary:hover{opacity:.92;background:var(--accent);}

/* ═══════ MAIN LAYOUT ═══════ */
.shell{flex:1;display:flex;min-height:0;}

/* ═══════ LEFT SIDEBAR ═══════ */
.sidebar{
  width:260px;flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-section{padding:16px 16px 8px;}
.sb-label{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2.5px;
  color:var(--text-dimmer);text-transform:uppercase;margin-bottom:10px;
}

.new-chat-btn{
  width:100%;background:var(--accent);color:white;border:none;
  padding:11px 14px;border-radius:10px;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;letter-spacing:.2px;cursor:pointer;
  display:flex;align-items:center;gap:8px;justify-content:center;
  transition:opacity .2s;
}
.new-chat-btn:hover{opacity:.92;}
.new-chat-btn .icon{font-size:15px;}

.thread-list{flex:1;overflow-y:auto;padding:4px 8px 16px;}
.thread{
  padding:9px 12px;border-radius:8px;cursor:pointer;
  color:var(--text-dim);font-size:13px;
  display:flex;align-items:center;gap:8px;
  transition:background .15s, color .15s;
  user-select:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.thread:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.thread.active{background:var(--accent-dim);color:var(--text);border-left:2px solid var(--accent);padding-left:10px;}
.thread-time{margin-left:auto;font-size:10px;color:var(--text-dimmer);flex-shrink:0;}

.sb-party{padding:14px 16px;border-top:1px solid var(--border);}
.party-chips{display:flex;flex-wrap:wrap;gap:6px;}
.party-chip{
  background:var(--surface);border:1px solid var(--border-strong);border-radius:7px;
  padding:4px 9px;font-size:11px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-weight:500;
  cursor:pointer;transition:border-color .15s, color .15s;
}
.party-chip:hover{border-color:rgba(232,184,109,.4);color:var(--gold);}

.sb-location{padding:12px 16px;border-top:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative;}
.sb-location:hover{background:rgba(255,255,255,0.03);}
.sb-loc-tag{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2.5px;color:var(--gold);margin-bottom:4px;}
.sb-loc-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.25;}
.sb-loc-meta{font-size:11px;color:var(--text-dim);font-style:italic;margin-top:3px;}
.sb-loc .chev{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-dimmer);font-size:12px;}

/* Location-picker dropdown (appears inside sidebar) */
.loc-picker{
  position:absolute;inset:100% 8px auto 8px;z-index:20;
  background:var(--surface-2);border:1px solid var(--border-strong);border-radius:12px;
  padding:6px;max-height:400px;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.85);
  display:none;
}
.loc-picker.open{display:block;}
.loc-group-title{padding:7px 10px 4px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2.5px;color:var(--gold);text-transform:uppercase;}
.loc-item{padding:8px 10px;border-radius:7px;font-size:13px;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s, color .1s;}
.loc-item:hover{background:rgba(255,255,255,.05);color:var(--text);}
.loc-item.active{background:var(--accent-dim);color:var(--text);}
.loc-item .status{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--text-dimmer);}
.loc-item.done .status{background:#4A8A4A;}
.loc-item.warn .status{background:var(--gold);}
.loc-item.active .status{background:var(--accent);}

/* ═══════ CHAT AREA ═══════ */
.chat-col{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);position:relative;}

.chat-scroll{
  flex:1;overflow-y:auto;padding:40px 0 20px;
  scroll-behavior:smooth;
}
.chat-inner{max-width:760px;margin:0 auto;padding:0 28px;display:flex;flex-direction:column;gap:28px;}

.msg{display:flex;gap:14px;align-items:flex-start;}
.msg-avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-weight:700;font-size:11px;letter-spacing:.5px;
  margin-top:2px;
}
.msg-user .msg-avatar{background:var(--surface);border:1px solid var(--border-strong);color:var(--text-dim);}
.msg-ai .msg-avatar{background:linear-gradient(135deg,var(--accent) 0%,#9A88FA 100%);color:#fff;box-shadow:0 0 16px rgba(123,108,246,.25);}
.msg-body{flex:1;min-width:0;}
.msg-role{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text-dimmer);text-transform:uppercase;margin-bottom:6px;}
.msg-ai .msg-role{color:var(--gold);}
.msg-content{font-size:14.5px;line-height:1.68;color:var(--text);}
.msg-content p{margin-bottom:10px;}
.msg-content p:last-child{margin-bottom:0;}
.msg-content strong{color:var(--gold);font-weight:600;}
.msg-content em{color:var(--text-dim);font-style:italic;}
.msg-content ul,.msg-content ol{margin:8px 0 10px 20px;}
.msg-content li{margin-bottom:4px;}
.msg-content code{background:var(--surface);border:1px solid var(--border);padding:1px 6px;border-radius:4px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--gold);}
.msg-content blockquote{border-left:3px solid var(--accent);padding:4px 14px;margin:10px 0;color:var(--text-dim);font-style:italic;font-family:'EB Garamond',serif;font-size:15.5px;background:rgba(123,108,246,0.04);}

/* Read-aloud block rendered from [READ_ALOUD: ...] */
.read-aloud-embed{
  background:rgba(224,74,58,0.06);border:1px solid rgba(224,74,58,0.22);
  border-left:3px solid var(--crimson);border-radius:0 8px 8px 0;
  padding:14px 18px;margin:14px 0;
  font-family:'EB Garamond',serif;font-size:15.5px;font-style:italic;
  color:rgba(255,245,230,0.92);line-height:1.6;
}
.read-aloud-embed-label{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--crimson);
  font-style:normal;margin-bottom:6px;text-transform:uppercase;
}

/* Image embed rendered from [GENERATE_IMAGE: ...] */
.img-embed{
  margin:14px 0;border-radius:14px;overflow:hidden;
  background:var(--surface);border:1px solid var(--border-strong);
  position:relative;
}
.img-embed img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover;}
.img-embed-caption{
  padding:10px 14px;font-size:12px;color:var(--text-dim);font-style:italic;
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  border-top:1px solid var(--border);
}
.img-embed-caption-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.img-embed-actions{display:flex;gap:4px;flex-shrink:0;}
.img-embed-action{font-size:10px;padding:4px 9px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid var(--border-strong);color:var(--text-dim);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.img-embed-action:hover{color:var(--gold);border-color:rgba(232,184,109,.3);}
.img-embed-loading{
  aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;
  background:linear-gradient(135deg,#111118 0%,#1a1a24 100%);color:var(--gold);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;
}
.spinner{width:26px;height:26px;border:2px solid rgba(232,184,109,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;text-align:center;gap:22px;
  max-width:580px;margin:40px auto 0;
}
.empty-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(232,184,109,0.1);border:1px solid rgba(232,184,109,0.3);border-radius:20px;padding:7px 16px;font-size:10px;color:var(--gold);letter-spacing:3px;font-family:'Cinzel',serif;}
.empty-state h1{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;line-height:1.05;letter-spacing:-0.02em;}
.empty-state h1 em{color:var(--gold);font-style:italic;}
.empty-state-sub{color:var(--text-dim);font-size:15px;line-height:1.65;max-width:460px;}
.suggestion-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:520px;margin-top:8px;}
.suggestion{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;cursor:pointer;text-align:left;transition:border-color .2s, transform .15s;
  font-family:'DM Sans',sans-serif;color:var(--text);font-size:13px;line-height:1.4;
}
.suggestion:hover{border-color:rgba(123,108,246,.4);transform:translateY(-1px);}
.suggestion-kicker{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--gold);margin-bottom:5px;}

/* ═══════ INPUT AREA ═══════ */
.input-wrap{flex-shrink:0;padding:14px 28px 22px;background:linear-gradient(to bottom, transparent 0%, var(--bg) 30%);}
.input-inner{max-width:760px;margin:0 auto;}
.input-box{
  display:flex;gap:10px;align-items:flex-end;
  background:var(--surface);border:1px solid var(--border-strong);border-radius:14px;
  padding:10px 12px 10px 16px;
  transition:border-color .2s, box-shadow .2s;
}
.input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-dim);}
.chat-input{
  flex:1;background:transparent;border:none;outline:none;resize:none;
  font-family:'DM Sans',sans-serif;font-size:14.5px;color:var(--text);
  line-height:1.5;max-height:200px;padding:7px 0;
}
.chat-input::placeholder{color:var(--text-dimmer);}
.send-btn{
  background:var(--accent);color:#fff;border:none;border-radius:9px;
  padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:opacity .2s, transform .1s;flex-shrink:0;
  display:flex;align-items:center;gap:6px;
}
.send-btn:hover{opacity:.92;}
.send-btn:active{transform:scale(.96);}
.send-btn:disabled{opacity:.35;cursor:not-allowed;}
.input-hint{margin-top:8px;font-size:11px;color:var(--text-dimmer);text-align:center;}
.input-hint kbd{background:var(--surface);border:1px solid var(--border-strong);border-radius:4px;padding:1px 6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--gold);color:var(--gold);padding:10px 20px;border-radius:10px;font-size:13px;z-index:100;font-family:'DM Sans',sans-serif;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.toast.error{border-color:var(--crimson);color:#ff8070;}

/* Scrollbars */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15);}

/* Typing indicator */
.typing{display:flex;gap:4px;align-items:center;padding:6px 0;}
.typing span{width:6px;height:6px;background:var(--gold);border-radius:50%;opacity:.4;animation:typingBounce 1.2s ease-in-out infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes typingBounce{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-4px);}}

/* Mobile */
@media (max-width:820px){
  .sidebar{width:72px;}
  .sidebar .sb-label,.sidebar .thread,.sidebar .sb-party,.sidebar .sb-loc-name,.sidebar .sb-loc-meta{display:none;}
  .sidebar .new-chat-btn{padding:10px;font-size:0;}
  .sidebar .new-chat-btn .icon{font-size:18px;}
  .sidebar .sb-location{padding:12px 8px;}
  .sb-loc-tag{font-size:9px;text-align:center;}
  .chat-inner{padding:0 16px;}
  .input-wrap{padding:12px 16px 18px;}
  .suggestion-grid{grid-template-columns:1fr;}
  .empty-state h1{font-size:30px;}
  .campaign-pill-meta{display:none;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="/" class="logo"><img src="https://endocraft.app/IMG_8431.PNG" alt="EndoCraft" onerror="this.style.display='none'">EndoCraft <span class="sub">DM Studio</span></a>
  <div class="topbar-sep"></div>
  <div class="campaign-pill" id="campaignPill" onclick="toggleLocPicker()">
    <div class="dot"></div>
    <div>
      <div class="campaign-pill-name" id="campName">Curse of Strahd</div>
      <div class="campaign-pill-meta" id="campMeta">Session 14 · Level 5–6</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn-top" onclick="exportPDF()">📄 PDF</button>
    <button class="btn-top" onclick="exportSession()">💾 Export</button>
  </div>
</div>

<!-- MAIN SHELL -->
<div class="shell">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-section">
      <button class="new-chat-btn" onclick="newThread()">
        <span class="icon">＋</span><span>Neue Unterhaltung</span>
      </button>
    </div>

    <div class="sb-section" style="padding-top:4px;padding-bottom:4px;">
      <div class="sb-label">Unterhaltungen</div>
    </div>
    <div class="thread-list" id="threadList"></div>

    <!-- Current location card with dropdown picker -->
    <div class="sb-location" onclick="toggleLocPicker()">
      <div class="sb-loc-tag">AKTUELLE SZENE</div>
      <div class="sb-loc-name" id="sbLocName">—</div>
      <div class="sb-loc-meta" id="sbLocMeta"></div>
      <span class="chev">⌄</span>
      <div class="loc-picker" id="locPicker" onclick="event.stopPropagation()"></div>
    </div>

    <div class="sb-party">
      <div class="sb-label">Party</div>
      <div class="party-chips" id="partyChips"></div>
    </div>
  </aside>

  <!-- CHAT COLUMN -->
  <div class="chat-col">
    <div class="chat-scroll" id="chatScroll">
      <div class="chat-inner" id="chatInner"></div>
    </div>

    <div class="input-wrap">
      <div class="input-inner">
        <div class="input-box">
          <textarea class="chat-input" id="chatInput" rows="1" placeholder="Frag deinen Co-DM..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMsg()">
            <span>Senden</span>
            <span>↵</span>
          </button>
        </div>
        <div class="input-hint"><kbd>Enter</kbd> senden · <kbd>Shift+Enter</kbd> Zeilenumbruch · KI kennt die gesamte Kampagne</div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// EndoCraft DM Studio — Chat-First AI Co-DM
// Phase 1 MVP — Private für Marcos Curse of Strahd Tisch
// ═══════════════════════════════════════════════════════════════════════════

const API_BASE = 'https://endocraft-production.up.railway.app';
const STORAGE_KEY = 'ec_dmstudio_v2';

// ═══════════ CAMPAIGN DATA ═══════════
const CAMPAIGN = {
  id: 'cos',
  name: 'Curse of Strahd',
  session: { number: 14, title: 'Orden des Silvanus', level: '5–6' },

  tree: [
    { id: 'wow', label: 'Wizard of Wines', locations: [

      { id: 'w15', name: 'W15 Teleportationskreis', status: 'pending' }
    ]},

      { id: 'ravenloft-dinner', name: 'Dinner with Strahd', status: 'pending' }
    ]},
    { id: 'weingut', label: 'Szenario B — Weingut', locations: [
      { id: 'weingut-verteidigung', name: 'Weingut-Verteidigung', status: 'pending' }
    ]},
    { id: 'yester-hill', label: 'Yester Hill', locations: [
      { id: 'yester-approach', name: 'Der Aufstieg', status: 'pending' }
    ]},
    { id: 'vallaki', label: 'Vallaki', locations: [
      { id: 'vallaki-blue-water', name: 'Blue Water Inn', status: 'pending' }
    ]}
  ],
  locations: {
    'w14': { name: 'W14 — Wine Cellar', meta: 'Wizard of Wines · Keller · Cliffhanger aktiv',
      readAloud: 'Der Keller riecht nach altem Wein und Erde. Überall Fässer — manche zerbrochen, ihr Inhalt längst versickert. In der Luft liegt etwas Süßliches, fast Betäubendes. Eine einzelne Fackel brennt am Ende des Ganges. Aus dem Dunkel löst sich eine Gestalt. Groß. Schlank. In dunkle Rüstung gekleidet. Rahadin.',

// ═══════════ STATE ═══════════
let state = loadState();
if (!state.threads) state.threads = [];  // [{id, title, messages, currentLocationId, updated}]
if (!state.activeThreadId) state.activeThreadId = null;
if (!state.currentLocationId) state.currentLocationId = 'w14';

function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch (e) { return {}; } }
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { console.warn(e); } }

function activeThread() {
  return state.threads.find(t => t.id === state.activeThreadId) || null;
}
function newThread() {
  const id = 't_' + Date.now().toString(36);
  const t = { id, title: 'Neue Unterhaltung', messages: [], currentLocationId: state.currentLocationId, updated: Date.now() };
  state.threads.unshift(t);
  state.activeThreadId = id;
  saveState();
  renderThreads(); renderChat();
  plausibleTrack('DMStudio · New Thread');
  setTimeout(() => document.getElementById('chatInput').focus(), 50);
}

// ═══════════ RENDER ═══════════
function renderCampaignMeta() {
  document.getElementById('campName').textContent = CAMPAIGN.name;
  document.getElementById('campMeta').textContent = `Session ${CAMPAIGN.session.number} · Level ${CAMPAIGN.session.level}`;
}

function renderParty() {
  document.getElementById('partyChips').innerHTML = CAMPAIGN.party.map(p => {
    const short = p.split(' ')[0];
    return `<div class="party-chip" title="${escapeHtml(p)}">${escapeHtml(short)}</div>`;
  }).join('');
}

function renderCurrentLocation() {
  const loc = CAMPAIGN.locations[state.currentLocationId];
  document.getElementById('sbLocName').textContent = loc ? loc.name : '—';
  document.getElementById('sbLocMeta').textContent = loc ? loc.meta : '';
}

function renderLocPicker() {
  const host = document.getElementById('locPicker');
  host.innerHTML = CAMPAIGN.tree.map(group => `
    <div class="loc-group-title">${escapeHtml(group.label)}</div>
    ${group.locations.map(l => `
      <div class="loc-item ${l.status === 'done' ? 'done' : ''} ${l.status === 'warn' ? 'warn' : ''} ${state.currentLocationId === l.id ? 'active' : ''}"
           onclick="selectLocation('${l.id}')">
        <span class="status"></span>${escapeHtml(l.name)}
      </div>
    `).join('')}
  `).join('');
}

function toggleLocPicker(e) {
  const picker = document.getElementById('locPicker');
  picker.classList.toggle('open');
  if (picker.classList.contains('open')) {
    renderLocPicker();
    const close = (ev) => { if (!picker.contains(ev.target) && !ev.target.closest('.sb-location') && !ev.target.closest('.campaign-pill')) { picker.classList.remove('open'); document.removeEventListener('click', close); } };
    setTimeout(() => document.addEventListener('click', close), 0);
  }
}

function selectLocation(id) {
  state.currentLocationId = id;
  const at = activeThread();
  if (at) { at.currentLocationId = id; at.updated = Date.now(); }
  saveState();
  renderCurrentLocation();
  document.getElementById('locPicker').classList.remove('open');
  toast('Standort: ' + CAMPAIGN.locations[id]?.name);
  plausibleTrack('DMStudio · Location', { location: id });
}

function renderThreads() {
  const host = document.getElementById('threadList');
  if (!state.threads.length) {
    host.innerHTML = '<div style="padding:20px 14px;font-size:12px;color:var(--text-dimmer);font-style:italic;">Noch keine Unterhaltungen. Neue starten ↑</div>';
    return;
  }
  const sorted = [...state.threads].sort((a, b) => b.updated - a.updated);
  host.innerHTML = sorted.map(t => `
    <div class="thread ${state.activeThreadId === t.id ? 'active' : ''}" onclick="openThread('${t.id}')" title="${escapeHtml(t.title)}">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(t.title)}</span>
    </div>`).join('');
}

function openThread(id) {
  state.activeThreadId = id;
  const t = activeThread();
  if (t?.currentLocationId) state.currentLocationId = t.currentLocationId;
  saveState();
  renderThreads(); renderCurrentLocation(); renderChat();
}

function renderChat() {
  const host = document.getElementById('chatInner');
  const t = activeThread();

  if (!t || !t.messages.length) {
    host.innerHTML = `
      <div class="empty-state">
        <div class="empty-tag">✦ AI CO-DM</div>
        <h1>Dein <em>Co-DM</em> kennt die ganze Kampagne.</h1>
        <div class="empty-state-sub">Frag nach NPC-Reaktionen, generier Vorlese-Texte, plan Szenen, erzeug Atmosphären-Bilder — dein Partner kennt jede Entscheidung, jeden Ort, jede Session.</div>
        <div class="suggestion-grid">
          <div class="suggestion" onclick="useSuggestion('Was würde Rahadin tun wenn die Party versucht zu verhandeln?')">
            <div class="suggestion-kicker">NPC-LOGIC</div>
            Was würde Rahadin tun wenn die Party versucht zu verhandeln?
          </div>
          <div class="suggestion" onclick="useSuggestion('Schreib mir einen Vorlese-Text für den Moment wenn die Party den Keller betritt.')">
            <div class="suggestion-kicker">READ-ALOUD</div>
            Schreib einen Vorlese-Text für den Keller-Eintritt.
          </div>
          <div class="suggestion" onclick="useSuggestion('Generier ein Szenen-Bild für den Wine Cellar.')">
            <div class="suggestion-kicker">IMAGE-GEN</div>
            Generier ein Szenen-Bild für den Wine Cellar.
          </div>
          <div class="suggestion" onclick="useSuggestion('Was sind die besten Konsequenzen wenn Larrymäus vom Deathly Choir getroffen wird?')">
            <div class="suggestion-kicker">MECHANICS</div>
            Konsequenzen wenn Larrymäus vom Deathly Choir getroffen wird?
          </div>
        </div>
      </div>`;
    return;
  }

  host.innerHTML = t.messages.map(m => renderMsg(m)).join('');
  // Rehydrate embedded images that were persisted
  document.querySelectorAll('[data-img-persisted]').forEach(el => {
    const url = el.getAttribute('data-img-persisted');
    el.innerHTML = `<img src="${escapeAttr(url)}" alt="Generated scene"><div class="img-embed-caption"><span class="img-embed-caption-text">${escapeHtml(el.dataset.caption || 'Generated scene')}</span><span class="img-embed-actions"><button class="img-embed-action" onclick="copyText('${escapeAttr(url)}')">URL kopieren</button><a class="img-embed-action" href="${escapeAttr(url)}" target="_blank">Öffnen</a></span></div>`;
  });
  scrollToBottom();
}

function renderMsg(m) {
  if (m.role === 'user') {
    return `<div class="msg msg-user">
      <div class="msg-avatar">DM</div>
      <div class="msg-body">
        <div class="msg-role">DM</div>
        <div class="msg-content">${escapeHtml(m.content).replace(/\n/g, '<br>')}</div>
      </div>
    </div>`;
  }
  const rendered = renderAssistantContent(m);
  return `<div class="msg msg-ai">
    <div class="msg-avatar">EC</div>
    <div class="msg-body">
      <div class="msg-role">Co-DM</div>
      <div class="msg-content">${rendered}</div>
    </div>
  </div>`;
}

function renderAssistantContent(m) {
  if (m.typing) return `<div class="typing"><span></span><span></span><span></span></div>`;
  let content = m.content || '';
  // Extract [READ_ALOUD: ...] blocks
  content = content.replace(/\[READ_ALOUD:\s*([\s\S]+?)\]/g, (_, text) =>
    `<div class="read-aloud-embed"><div class="read-aloud-embed-label">VORLESEN</div>${mdInline(text.trim())}</div>`);
  // Extract [GENERATE_IMAGE: prompt] — replace with image placeholder/embedded image
  content = content.replace(/\[GENERATE_IMAGE:\s*([\s\S]+?)\]/g, (_, prompt) => {
    const cached = m.images?.[prompt.trim()];
    if (cached) {
      return `<div class="img-embed"><img src="${escapeAttr(cached)}" alt="Scene"><div class="img-embed-caption"><span class="img-embed-caption-text">${escapeHtml(prompt.trim().slice(0, 80))}</span><span class="img-embed-actions"><button class="img-embed-action" onclick="copyText('${escapeAttr(cached)}')">URL</button><a class="img-embed-action" href="${escapeAttr(cached)}" target="_blank">↗</a></span></div></div>`;
    }
    return `<div class="img-embed" data-generate-prompt="${escapeAttr(prompt.trim())}" data-msg-id="${m.id}"><div class="img-embed-loading"><div class="spinner"></div><span>Generiert…</span></div></div>`;
  });
  return mdBlock(content);
}

// Very small Markdown subset: paragraphs, **bold**, *italic*, `code`, > blockquote, - lists
function mdInline(s) {
  return escapeHtml(s)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}
function mdBlock(s) {
  // Preserve already-rendered HTML blocks (read-aloud, img-embed)
  // Process paragraphs only outside those blocks
  const parts = s.split(/(<div class="(?:read-aloud-embed|img-embed)[\s\S]*?<\/div>)/g);
  return parts.map(part => {
    if (part.startsWith('<div class="read-aloud-embed') || part.startsWith('<div class="img-embed')) return part;
    // Turn blank-line separated paragraphs
    const paragraphs = part.trim().split(/\n{2,}/).filter(Boolean);
    return paragraphs.map(p => {
      p = p.trim();
      // blockquote
      if (/^>\s/.test(p)) return `<blockquote>${mdInline(p.replace(/^>\s*/gm, ''))}</blockquote>`;
      // Unordered list
      if (/^[-*]\s/.test(p)) {
        const items = p.split(/\n/).filter(Boolean).map(line => `<li>${mdInline(line.replace(/^[-*]\s*/, ''))}</li>`).join('');
        return `<ul>${items}</ul>`;
      }
      // Ordered list
      if (/^\d+\.\s/.test(p)) {
        const items = p.split(/\n/).filter(Boolean).map(line => `<li>${mdInline(line.replace(/^\d+\.\s*/, ''))}</li>`).join('');
        return `<ol>${items}</ol>`;
      }
      return `<p>${mdInline(p).replace(/\n/g, '<br>')}</p>`;
    }).join('');
  }).join('');
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s); }

function scrollToBottom() {
  const el = document.getElementById('chatScroll');
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

// ═══════════ SEND FLOW ═══════════
async function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim(); if (!text) return;

  // Ensure we have an active thread
  if (!state.activeThreadId) newThread();
  const t = activeThread(); if (!t) return;

  // First message → set title
  if (!t.messages.length) t.title = text.slice(0, 60);

  t.messages.push({ id: 'm_' + Date.now().toString(36), role: 'user', content: text });
  t.updated = Date.now();
  input.value = ''; autoGrow(input);

  // Placeholder for AI response (typing indicator)
  const aiMsgId = 'm_' + Date.now().toString(36) + '_ai';
  t.messages.push({ id: aiMsgId, role: 'assistant', content: '', typing: true });
  saveState(); renderThreads(); renderChat();

  try {
    const apiMessages = t.messages
      .filter(m => !m.typing)
      .map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content }));

    const resp = await fetch(`${API_BASE}/api/dm-chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        campaign: { ...CAMPAIGN, currentLocationId: state.currentLocationId },
        messages: apiMessages
      })
    });
    const data = await resp.json();

    let content = '';
    if (data.content && Array.isArray(data.content)) {
      content = data.content.map(c => c.type === 'text' ? c.text : '').join('\n\n').trim();
    } else if (typeof data.content === 'string') {
      content = data.content;
    }
    if (!content) content = '(Keine Antwort erhalten' + (data.error ? `: ${JSON.stringify(data.error).slice(0, 200)}` : '') + ')';

    // Replace typing message with real content
    const aiMsg = t.messages.find(m => m.id === aiMsgId);
    if (aiMsg) { aiMsg.content = content; aiMsg.typing = false; aiMsg.images = aiMsg.images || {}; }
    t.updated = Date.now();
    saveState(); renderThreads(); renderChat();

    // Auto-generate images for any [GENERATE_IMAGE] tags in the response
    const imgPrompts = [...content.matchAll(/\[GENERATE_IMAGE:\s*([\s\S]+?)\]/g)].map(m => m[1].trim());
    for (const prompt of imgPrompts) {
      generateEmbeddedImage(aiMsgId, prompt);
    }

    plausibleTrack('DMStudio · Message Sent', { location: state.currentLocationId });
  } catch (err) {
    console.error(err);
    const aiMsg = t.messages.find(m => m.id === aiMsgId);
    if (aiMsg) { aiMsg.content = '❌ Fehler: ' + err.message; aiMsg.typing = false; }
    saveState(); renderChat();
    toast('Chat-Fehler: ' + err.message, true);
  }
}

async function generateEmbeddedImage(msgId, prompt) {
  try {
    const resp = await fetch(`${API_BASE}/api/image`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt + ', cinematic fantasy, photorealistic, 8K, atmospheric, no text, no watermark', model: 'bytedance/seedream-4-5', width: 1920, height: 1080 })
    });
    const data = await resp.json();
    const url = extractImageUrl(data);
    if (!url) throw new Error(data?.error ? JSON.stringify(data.error) : 'no url');

    // Find the message and attach image
    const t = activeThread(); if (!t) return;
    const msg = t.messages.find(m => m.id === msgId); if (!msg) return;
    msg.images = msg.images || {};
    msg.images[prompt] = url;
    saveState(); renderChat();
  } catch (err) {
    console.error('[image gen]', err);
    // Find the loading placeholder and show an error state
    const placeholder = document.querySelector(`[data-generate-prompt="${escapeAttr(prompt)}"]`);
    if (placeholder) placeholder.innerHTML = `<div class="img-embed-loading" style="color:var(--crimson);">Bild-Gen fehlgeschlagen</div>`;
  }
}

function extractImageUrl(d) {
  if (!d) return null;
  if (typeof d === 'string' && /^https?:\/\//.test(d)) return d;
  if (typeof d.url === 'string') return d.url;
  if (d.url && typeof d.url === 'object') return extractImageUrl(d.url);
  if (typeof d.image_url === 'string') return d.image_url;
  if (Array.isArray(d.images) && d.images[0]) return extractImageUrl(d.images[0]);
  if (Array.isArray(d.data) && d.data[0]) return extractImageUrl(d.data[0]);
  if (Array.isArray(d.output) && d.output[0]) return extractImageUrl(d.output[0]);
  if (typeof d.output === 'string') return d.output;
  return null;
}

// ═══════════ HELPERS ═══════════
function useSuggestion(text) {
  const input = document.getElementById('chatInput');
  input.value = text; autoGrow(input); input.focus();
  sendMsg();
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(200, el.scrollHeight) + 'px';
  document.getElementById('sendBtn').disabled = !el.value.trim();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

async function copyText(t) {
  try { await navigator.clipboard.writeText(t); toast('In Zwischenablage'); }
  catch (e) { toast('Konnte nicht kopieren', true); }
}

function exportPDF() { toast('PDF-Gen via Playwright · kommt in Phase 1b'); }
function exportSession() {
  const t = activeThread(); if (!t) { toast('Kein Thread offen', true); return; }
  const blob = new Blob([JSON.stringify({ campaign: CAMPAIGN.id, thread: t, exported: new Date().toISOString() }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dm-studio-${t.id}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Export gestartet');
}

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.toggle('error', !!isError); t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), 2200);
}

function plausibleTrack(event, props) {
  try { window.plausible && window.plausible(event, { props: props || {} }); } catch (e) {}
}

renderParty();

renderThreads();
