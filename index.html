<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EndoCraft — Free Cinematic D&D Cutscenes</title>
<meta name="description" content="Get a free cinematic cutscene of your D&D character or villain. Tell us who — we craft it and email it to you.">
<link rel="canonical" href="https://endocraft.app/free/">

<!-- Privacy-friendly analytics by Plausible (records the visit + traffic source before redirect) -->
<script async src="https://plausible.io/js/pa-XyfUV-SPa2VMk20wnbpyy.js"></script>
<script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()
</script>

<!-- noscript fallback: still reach the free funnel if JS is off -->
<noscript><meta http-equiv="refresh" content="0; url=https://endocraft.app/free/"></noscript>

<script>
  (function () {
    // Send everyone to the free-cutscene funnel; preserve the traffic source for tracking.
    var p = new URLSearchParams(location.search);
    var src = p.get('utm_source');
    if (!src) {
      var ref = (document.referrer || '').toLowerCase();
      if (/tiktok/.test(ref)) src = 'tiktok';
      else if (/instagram/.test(ref)) src = 'instagram';
      else if (/pinterest|pin\.it/.test(ref)) src = 'pinterest';
      else if (/etsy/.test(ref)) src = 'etsy';
      else if (/google/.test(ref)) src = 'google';
      else src = 'direct';
    }
    var dest = 'https://endocraft.app/free/?utm_source=' + encodeURIComponent(src) + '&utm_medium=root&utm_campaign=cutscene';
    // Give Plausible a moment to record this root pageview before leaving.
    setTimeout(function () { window.location.replace(dest); }, 600);
  })();
</script>

body{margin:0;background:#10131c;color:#e9e4d6;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh}

h1{color:#d8b46a;font-size:26px;letter-spacing:1px;margin:0 0 12px}
p{color:#9aa0b3;line-height:1.6}
a{color:#d8b46a;font-weight:700}
</style>
</head>
<body>
<div>
  <h1>ENDOCRAFT</h1>
  <p>A free cinematic cutscene of your D&amp;D character — crafted and emailed to you.</p>
  <p><a href="https://endocraft.app/free/">→ Claim your free cutscene</a></p>
</div>
</body>
</html>
